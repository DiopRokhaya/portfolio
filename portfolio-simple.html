<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Rokhaya Diop | Simple</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Georgia, serif;
            background: #FFFBF7;
            color: #4A4A4A;
            line-height: 1.8;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .hero {
            padding: 60px 0;
            text-align: center;
        }
        
        .hero-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }
        
        .hero-text h1 {
            font-size: 2.5rem;
            color: #C89595;
            margin-bottom: 10px;
        }
        
        .hero-text h2 {
            font-size: 1.5rem;
            color: #6D6875;
            margin-bottom: 20px;
        }
        
        /* Photo de profil - STYLES SIMPLES ET DIRECTS */
        .profile-container {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            overflow: hidden;
            border: 8px solid rgba(255, 251, 250, 0.9);
            box-shadow: 0 20px 40px rgba(200, 149, 149, 0.2);
            position: relative;
            background: white;
        }
        
        .profile-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }
        
        /* Mobile - STYLES SIMPLES */
        @media (max-width: 768px) {
            .profile-container {
                width: 200px;
                height: 200px;
            }
            
            .hero-text h1 {
                font-size: 2rem;
            }
            
            .hero-text h2 {
                font-size: 1.2rem;
            }
        }
        
        /* iPhone XR - STYLES SIMPLES */
        @media only screen 
        and (device-width: 414px) 
        and (device-height: 896px) 
        and (-webkit-device-pixel-ratio: 2) {
            .profile-container {
                width: 220px;
                height: 220px;
            }
        }
        
        .skills-section {
            margin-top: 80px;
        }
        
        .skills-section h2 {
            text-align: center;
            font-size: 2.5rem;
            color: #6D6875;
            margin-bottom: 50px;
        }
        
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
            max-width: 1000px;
            margin: 0 auto;
        }
        
        @media (max-width: 768px) {
            .skills-grid {
                grid-template-columns: 1fr;
                gap: 30px;
                padding: 0 20px;
            }
        }
        
        .skill-card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(212, 165, 165, 0.1);
            border: 1px solid rgba(212, 165, 165, 0.1);
        }
        
        .skill-card h3 {
            color: #C89595;
            margin-bottom: 20px;
            font-size: 1.3rem;
        }
        
        .skill-item {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .skill-item span {
            min-width: 120px;
            font-weight: 500;
        }
        
        .skill-bar {
            flex: 1;
            height: 8px;
            background: linear-gradient(90deg, rgba(245, 229, 229, 0.3), rgba(245, 229, 229, 0.6));
            border-radius: 10px;
            overflow: hidden;
        }
        
        .skill-progress {
            height: 100%;
            background: linear-gradient(90deg, #C89595, #6D6875);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <!-- Section Hero -->
    <section class="hero">
        <div class="container">
            <div class="hero-content">
                <div class="hero-text">
                    <h1>Rokhaya Diop</h1>
                    <h2>Digital Lead & Développeuse FullStack</h2>
                </div>
                <div class="profile-container">
                    <img src="ma photo R.jpg" alt="Photo de profil">
                </div>
            </div>
        </div>
    </section>

    <!-- Section Compétences -->
    <section class="skills-section">
        <div class="container">
            <h2>Compétences Techniques</h2>
            <div class="skills-grid">
                <div class="skill-card">
                    <h3>IDE et Framework</h3>
                    <div class="skill-item">
                        <span>IntelliJ IDEA</span>
                        <div class="skill-bar">
                            <div class="skill-progress" style="width: 95%"></div>
                        </div>
                    </div>
                    <div class="skill-item">
                        <span>VS Code</span>
                        <div class="skill-bar">
                            <div class="skill-progress" style="width: 98%"></div>
                        </div>
                    </div>
                    <div class="skill-item">
                        <span>WordPress</span>
                        <div class="skill-bar">
                            <div class="skill-progress" style="width: 95%"></div>
                        </div>
                    </div>
                </div>
                
                <div class="skill-card">
                    <h3>Programmation</h3>
                    <div class="skill-item">
                        <span>Java</span>
                        <div class="skill-bar">
                            <div class="skill-progress" style="width: 95%"></div>
                        </div>
                    </div>
                    <div class="skill-item">
                        <span>HTML5</span>
                        <div class="skill-bar">
                            <div class="skill-progress" style="width: 95%"></div>
                        </div>
                    </div>
                    <div class="skill-item">
                        <span>JavaScript</span>
                        <div class="skill-bar">
                            <div class="skill-progress" style="width: 95%"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
